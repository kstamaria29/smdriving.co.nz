<!doctype html>
<html lang="en-NZ">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <meta
      name="description"
      content="SM Driving School Ltd offers practical Auckland driving lessons, restricted and full licence preparation, and overseas licence conversion support with NZTA Approved instructor Clifford Sta Maria."
    />
    <meta
      name="theme-color"
      content="#0d1930"
    />
    <title>SM Driving School Ltd | Auckland Driving Lessons</title>
    <link
      rel="preconnect"
      href="https://fonts.googleapis.com"
    />
    <link
      rel="preconnect"
      href="https://fonts.gstatic.com"
      crossorigin
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Sora:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <script>
      (() => {
        try {
          const storedTheme = localStorage.getItem("sm-driving-theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark"
              ? storedTheme
              : window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        } catch (_) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/main.tsx"
    ></script>
  </body>
</html>
